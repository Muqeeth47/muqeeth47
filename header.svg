<svg xmlns="http://www.w3.org/2000/svg" width="860" height="200" viewBox="0 0 860 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&amp;family=Caveat:wght@700&amp;family=Noto+Sans:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="#0d001a" rx="16"/>

  <!-- Subtle grid lines (portfolio aesthetic) -->
  <line x1="0" y1="100" x2="860" y2="100" stroke="#1a0033" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="200" stroke="#1a0033" stroke-width="1"/>

  <!-- I AM — white, faded -->
  <text x="44" y="148" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="88" fill="white" opacity="0.55" letter-spacing="-2">I AM</text>

  <!-- MUQEETH — white, full -->
  <text x="44" y="148" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="88" fill="white" letter-spacing="-2">
    <tspan dx="260">MUQEETH</tspan>
  </text>

  <!-- I'm an Artist — bottom right -->
  <text x="816" y="186" font-family="'Caveat', cursive" font-weight="700"
        font-size="28" fill="#c084fc" text-anchor="end">I&apos;m an Artist</text>

  <!-- Violet accent line under MUQEETH -->
  <rect x="44" y="158" width="816" height="3" fill="#c084fc" opacity="0.4" rx="2"/>
</svg>
